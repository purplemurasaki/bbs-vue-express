name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Run first-time EC2 bootstrap and schema apply'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: |
          npm ci
          npm run build

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Create release tarball
        run: |
          SHA="${{ steps.ref.outputs.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RELEASE_DIR="release-${SHA}"
          mkdir -p "${RELEASE_DIR}/backend/dist" \
            "${RELEASE_DIR}/frontend/dist" \
            "${RELEASE_DIR}/db/schema" \
            "${RELEASE_DIR}/deploy/scripts" \
            "${RELEASE_DIR}/deploy/config/nginx" \
            "${RELEASE_DIR}/deploy/config/systemd"
          cp -r backend/dist "${RELEASE_DIR}/backend/"
          cp backend/package.json backend/package-lock.json "${RELEASE_DIR}/backend/"
          cp -r frontend/dist/. "${RELEASE_DIR}/frontend/dist/"
          cp -r db/schema/. "${RELEASE_DIR}/db/schema/"
          cp deploy/scripts/*.sh "${RELEASE_DIR}/deploy/scripts/"
          cp deploy/config/nginx/bbs.conf "${RELEASE_DIR}/deploy/config/nginx/"
          cp deploy/config/systemd/bbs-backend.service "${RELEASE_DIR}/deploy/config/systemd/"
          tar -czf "release-${SHORT_SHA}.tar.gz" -C "${RELEASE_DIR}" .
          echo "RELEASE_KEY=releases/${SHA}.tar.gz" >> "$GITHUB_ENV"
          echo "RELEASE_ID=${SHA}" >> "$GITHUB_ENV"
          echo "TARBALL=release-${SHORT_SHA}.tar.gz" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload release to S3
        run: |
          aws s3 cp "${{ env.TARBALL }}" "s3://${{ vars.DEPLOY_BUCKET }}/${{ env.RELEASE_KEY }}"

      - name: Deploy via SSM
        env:
          BOOTSTRAP: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap == 'true' && 'true' || 'false' }}
          RUN_SCHEMA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bootstrap == 'true' && 'true' || 'false' }}
        run: |
          BOOTSTRAP_FLAG="${BOOTSTRAP}"
          SCHEMA_FLAG="${RUN_SCHEMA}"
          if [ "$BOOTSTRAP_FLAG" != "true" ]; then BOOTSTRAP_FLAG="false"; fi
          if [ "$SCHEMA_FLAG" != "true" ]; then SCHEMA_FLAG="false"; fi

          REMOTE_SCRIPT=$(cat <<'EOS'
          set -euo pipefail
          TDIR=$(mktemp -d)
          trap 'rm -rf "$TDIR"' EXIT
          export DEPLOY_BUCKET="__DEPLOY_BUCKET__"
          export RELEASE_KEY="__RELEASE_KEY__"
          export AWS_REGION="__AWS_REGION__"
          export RELEASE_ID="__RELEASE_ID__"
          export BOOTSTRAP="__BOOTSTRAP__"
          export RUN_SCHEMA_APPLY="__RUN_SCHEMA__"
          export DB_SECRET_ARN="__DB_SECRET_ARN__"
          export S3_BUCKET="__S3_BUCKET__"
          export CLOUDFRONT_BASE_URL="__CLOUDFRONT_BASE_URL__"
          export CORS_ORIGIN="__CORS_ORIGIN__"
          aws s3 cp "s3://${DEPLOY_BUCKET}/${RELEASE_KEY}" "$TDIR/release.tar.gz" --region "$AWS_REGION"
          mkdir -p "$TDIR/extract"
          tar -xzf "$TDIR/release.tar.gz" -C "$TDIR/extract"
          export PRE_EXTRACTED_DIR="$TDIR/extract"
          bash "$TDIR/extract/deploy/scripts/ssm-entry.sh"
          EOS
          )
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__DEPLOY_BUCKET__/${{ vars.DEPLOY_BUCKET }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__RELEASE_KEY__/${{ env.RELEASE_KEY }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__AWS_REGION__/${{ vars.AWS_REGION }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__RELEASE_ID__/${{ env.RELEASE_ID }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__BOOTSTRAP__/${BOOTSTRAP_FLAG}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__RUN_SCHEMA__/${SCHEMA_FLAG}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__DB_SECRET_ARN__/${{ vars.DB_SECRET_ARN }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__S3_BUCKET__/${{ vars.S3_BUCKET }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__CLOUDFRONT_BASE_URL__/${{ vars.CLOUDFRONT_BASE_URL }}}"
          REMOTE_SCRIPT="${REMOTE_SCRIPT//__CORS_ORIGIN__/${{ vars.CORS_ORIGIN }}}"

          B64=$(printf '%s' "$REMOTE_SCRIPT" | base64 -w0)
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "bbs CD ${{ env.RELEASE_ID }}" \
            --timeout-seconds 900 \
            --parameters "{\"commands\":[\"echo ${B64} | base64 -d | bash\"]}" \
            --query Command.CommandId \
            --output text)

          echo "SSM CommandId: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query Status \
            --output text)
          echo "SSM Status: $STATUS"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query '[StandardOutputContent, StandardErrorContent]' \
            --output text

          if [ "$STATUS" != "Success" ]; then
            exit 1
          fi

      - name: Health check
        if: vars.CORS_ORIGIN != ''
        run: |
          curl -fsS "${{ vars.CORS_ORIGIN }}/api/health"
          echo "Health check OK"
